name: Kontrola Akcii na WhatsApp

on:
  schedule:
    # Spouští se každou hodinu od 14:00 do 22:00 našeho času (12:00 až 20:00 UTC), pondělí až pátek
    - cron: '0 12-20 * * 1-5'
  workflow_dispatch: # Tlačítko pro ruční spuštění kdykoliv

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
    - name: Načtení kódu z repozitáře
      uses: actions/checkout@v3

    - name: Nastavení Pythonu
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Instalace potřebných knihoven
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Spuštění hlídače akcií
      run: python hlidac.py
      
